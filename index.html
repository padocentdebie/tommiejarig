<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tommie is jarig!</title>
<style>
  body {
    background: linear-gradient(to bottom right, #87ceeb, #ffe4e1);
    text-align: center;
    font-family: 'Comic Sans MS', cursive;
    padding-top: 100px;
  }
  h1 {
    font-size: 3em;
    color: #ff1493;
    animation: swing 3s infinite ease-in-out;
  }
  p {
    font-size: 1.5em;
    color: #333;
  }
  @keyframes swing {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-3deg); }
    100% { transform: rotate(0deg); }
  }
  audio {
    margin-top: 30px;
  }
</style>
</head>
<body>

<h1>🎉 Tommie is jarig vandaag! 🎂</h1>
<p>Gezongen boodschap (in het Nederlands):<br>
<strong>“Hoera, hoera, Tommie is jarig vandaag, op 4 april!”</strong></p>

<p>Und jetzt auf Deutsch:<br>
<strong>„Hurra, hurra, Tommie hat heute Geburtstag, am 4. April!“</strong></p>

<p>🎶 Veel geluk, lieber Tommie! 🎶</p>

</body>
</html>
